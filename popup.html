<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2-Step Zoom Recording Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>2-Step Zoom Recording Downloader</h1>
      <p class="subtitle">Capture the playback URL and download with local cURL.</p>

      <section id="captureCard" class="status-card capture-card">
        <div class="capture-head">
          <div class="label">Captured Link</div>
        </div>
        <div class="row capture-row">
          <div id="capturedLink" class="value capture-value">(none)</div>
          <button id="btnCopyLink" class="icon-btn" title="Copy link">⧉</button>
        </div>
        <div id="captureMeta" class="hint capture-meta hidden"></div>
      </section>

      <section id="progressCard" class="status-card progress-card">
        <div class="progress-head">
          <div class="label">Progress</div>
          <div id="progressText" class="progress-percent">0%</div>
        </div>
        <div class="bar-wrap" aria-hidden="true">
          <div id="progressBar" class="bar"></div>
        </div>
        <div class="row progress-row">
          <div id="downloadState" class="hint">Ready</div>
          <button id="btnOpenInline" class="icon-btn hidden" title="Open file location">📂</button>
        </div>
      </section>

      <section id="setupCard" class="status-card">
        <div class="row">
          <div class="label">Native Host</div>
          <button id="btnRefreshNative" class="icon-btn refresh-btn" title="Re-check native host status">↻</button>
          <div id="setupStatusPill" class="setup-pill checking">Checking...</div>
        </div>
        <div id="setupDetails" class="setup-details hidden">
          <div class="row">
            <div id="setupCommand" class="cmd">(building command...)</div>
            <button id="btnCopySetup" class="icon-btn" title="Copy setup command">⧉</button>
          </div>
          <a id="setupUrl" class="hint-link" href="#" target="_blank" rel="noopener noreferrer">Open cloud installer script</a>
        </div>
      </section>

      <section class="pad">
        <button id="btnCapture" class="btn primary">1. Capture Link</button>
        <button id="btnDownload" class="btn success">2. Download</button>
      </section>

      <div id="toast" class="toast hidden" role="status" aria-live="polite">
        <span id="toastMsg"></span>
        <button id="btnCloseToast" class="toast-close" title="Close">✕</button>
      </div>

      <section class="status-card history-card">
        <div class="label">History</div>
        <div id="historyBody" class="history-body">
          <div id="historyList" class="history-list">(empty)</div>
        </div>
      </section>
      <div class="footer-bar">
        <button id="btnReset" class="reset-link">Reset state</button>
        <a href="https://t.me/+OJRMPWOSwF9mZDU1" target="_blank" rel="noopener noreferrer" class="telegram-link">
          <svg class="tg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          Telegram Support
        </a>
      </div>

    </main>

    <script src="popup.js"></script>
  </body>
</html>
